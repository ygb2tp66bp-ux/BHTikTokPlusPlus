name: Create BHTikTokPlusPlus app

on:
  workflow_dispatch:
    inputs:
      decrypted_ipa_url:
        description: 'Direct link to decrypted TikTok IPA'
        required: true
      version:
        description: 'Version name (optional)'
        required: false
        default: 'latest'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download decrypted IPA
        run: |
          curl -L -o TikTok.ipa "${{ inputs.decrypted_ipa_url }}"

      - name: Build Tweaks
        run: |
          # Tutaj będzie logika budowania (zależnie od repo)
          echo "Build started..."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BHTikTokPlusPlus
          path: "*.ipa"
